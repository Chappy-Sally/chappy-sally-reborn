<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>わたしに戻るメッセージ</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
      background: linear-gradient(180deg, #f7fbff 0%, #eef8ff 40%, #fdf6ff 100%);
      color: #333;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: rgba(255, 255, 255, 0.92);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(118, 129, 189, 0.18);
      margin-bottom: 18px;
    }

    .cover-image {
      width: 100%;
      border-radius: 22px;
      display: block;
      box-shadow: 0 10px 24px rgba(120, 120, 180, 0.18);
    }

    h1, h2, h3 {
      margin-top: 0;
      color: #463fcf;
      line-height: 1.5;
    }

    .sub {
      color: #666;
      font-size: 15px;
      line-height: 1.8;
    }

    .center {
      text-align: center;
    }

    .hidden {
      display: none;
    }

    .question-block {
      margin-bottom: 20px;
      padding: 14px;
      border-radius: 18px;
      background: #f9fbff;
      border: 1px solid #e6ecff;
    }

    .question-title {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 12px;
      color: #3b3bc1;
      line-height: 1.7;
    }

    .option-list {
      display: grid;
      gap: 10px;
    }

    label.option {
      display: block;
      background: #fff;
      border: 2px solid #dcdfff;
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      transition: 0.2s;
      line-height: 1.6;
    }

    label.option:hover {
      border-color: #9aa4ff;
      background: #f7f8ff;
    }

    input[type="radio"] {
      margin-right: 8px;
      transform: scale(1.1);
    }

    input[type="date"] {
      width: 100%;
      border: 2px solid #dcdfff;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      background: #fff;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      display: inline-block;
      text-align: center;
    }

    .btn-primary {
      background: linear-gradient(135deg, #5964ff, #8f6bff);
      color: #fff;
      box-shadow: 0 8px 18px rgba(95, 101, 255, 0.28);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .btn-secondary {
      background: #fff;
      color: #4a49b8;
      border: 2px solid #cfd4ff;
    }

    .btn-wrap {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 18px;
    }

    .result-box {
      background: linear-gradient(180deg, #ffffff, #f9f8ff);
      border: 1px solid #ece7ff;
      border-radius: 18px;
      padding: 18px;
      line-height: 2;
      white-space: pre-line;
      font-size: 16px;
    }

    .type-box {
      background: linear-gradient(180deg, #f3f5ff, #fff7ff);
      border: 2px solid #d8ddff;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 16px;
      line-height: 1.9;
    }

    .footer-note {
      margin-top: 18px;
      font-size: 14px;
      color: #666;
      text-align: center;
      line-height: 1.8;
    }

    .alert {
      color: #c74a70;
      font-weight: bold;
      text-align: center;
      margin-top: 10px;
      line-height: 1.8;
    }

    @media (max-width: 480px) {
      .container {
        padding: 12px;
      }

      .card {
        padding: 14px;
      }

      .question-title {
        font-size: 16px;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- 表紙 -->
    <section id="coverSection" class="card center">
      <img src="image/cs_reborn.png" alt="わたしに戻るメッセージ表紙" class="cover-image">
      <div class="btn-wrap">
        <button class="btn btn-primary" onclick="showQuestionSection()">はじめる</button>
      </div>
    </section>

    <!-- 質問 -->
    <section id="questionSection" class="card hidden">
      <h2 class="center">わたしに戻るメッセージ🐾</h2>
      <p class="sub center">誕生日と5つの質問に答えてね。<br>今のあなたにやさしいメッセージをお届けするよ🌈</p>

      <div class="question-block">
        <div class="question-title">① 誕生日を入力してね🎂</div>
        <input type="date" id="birthday">
      </div>

      <div id="questionsArea"></div>

      <div id="errorMessage" class="alert hidden"></div>

      <div class="btn-wrap">
        <button class="btn btn-primary" onclick="showResult()">メッセージを受け取る</button>
      </div>
    </section>

    <!-- 結果 -->
    <section id="resultSection" class="card hidden">
      <h2 class="center">あなたへのメッセージ🌈</h2>

      <div id="typeBox" class="type-box"></div>
      <div id="resultBox" class="result-box"></div>

      <div class="footer-note">
        このメッセージが、少しでも心をゆるめるきっかけになりますように🌿
      </div>

      <div class="btn-wrap">
        <button class="btn btn-secondary" onclick="backToTop()">もう一度やる</button>
      </div>
    </section>

  </div>

  <script>
    const questions = [
      {
        id: "q1",
        title: "② 今の気分は？",
        options: [
          { value: "genki", label: "元気", message: "今は前に進む力がちゃんとあるみたい✨\n動けるエネルギーがあるときこそ、無理しすぎず軽やかさも大切にしてみてね。" },
          { value: "futsu", label: "普通", message: "大きく崩れてはいないけれど、心は静かにサインを出しているのかも🌿\n今の自分の小さな気持ちにも、やさしく気づいてあげてね。" },
          { value: "moyamoya", label: "モヤモヤ", message: "心の中に言葉になりきらない思いが少したまっているのかも☁️\no焦らずに、まずは『何が引っかかっているのかな？』と見つめてあげてね。" },
          { value: "shindoi", label: "しんどい", message: "知らないうちに、がんばりすぎていたのかもしれないね💧\n今は気合いよりも、安心できるほうを選んで大丈夫だよ。" },
          { value: "tanoshii", label: "楽しい", message: "心がやわらかく開いていて、いい流れを受け取りやすいタイミングみたい🌈\nその楽しさを、がんばる理由ではなく喜びとして味わってね。" }
        ]
      },
      {
        id: "q2",
        title: "③ 今いちばん気になっていることは？",
        options: [
          { value: "ningen", label: "人間関係", message: "人との距離感や空気に、心が少し敏感になっているのかも🌙\n全部に合わせようとしなくて大丈夫。あなたの心地よさも大切だよ。" },
          { value: "okane", label: "お金", message: "お金のことが気になるときは、安心したい気持ちが奥にあることも多いよ💫\n責めるより、今できていることにも目を向けてみてね。" },
          { value: "shigoto", label: "仕事", message: "役割ややることに意識が向いていて、きちんとしたい思いが強まっているのかも🔥\nがんばる力はあるからこそ、ひと息つく時間も大事にしてね。" },
          { value: "korekara", label: "これから", message: "未来のことを考えるほど、ちゃんとしたい気持ちと不安が混ざりやすい時期かも🌱\n全部決めなくていいよ。今の一歩から整っていくからね。" },
          { value: "tokunai", label: "特にない", message: "はっきりした悩みはなくても、心が静かに整う時間を求めていたのかも🌿\n何もないようでいて、今のあなたに必要な気づきはちゃんとあるよ。" }
        ]
      },
      {
        id: "q3",
        title: "④ 今の自分にいちばん近いのは？",
        options: [
          { value: "ganbatteru", label: "がんばってる", message: "あなたはちゃんと進もうとしていて、その姿はとても健気だよ🌸\nでも『ちゃんとしなきゃ』が少し強くなっているなら、少しゆるめても大丈夫。" },
          { value: "mayotteru", label: "迷ってる", message: "答えを急ぎたくなるけれど、まだ心が整理の途中なのかも🫧\n迷っている今も、ちゃんと大切な途中経過だよ。" },
          { value: "tsukareteru", label: "疲れてる", message: "体より先に心が『そろそろ休みたいよ』と教えてくれているのかも💧\nまずは回復を選ぶことも、前に進む準備のひとつだよ。" },
          { value: "ochitsuite", label: "落ち着いてる", message: "大きく波立たず、少し俯瞰して見られているタイミングみたい🌿\n静かな今だからこそ、本音にやさしく気づけそうだよ。" },
          { value: "maemuki", label: "前向き", message: "未来に向かう光を、ちゃんと自分の中に感じているみたい✨\nその気持ちを焦りに変えず、やさしく育てていってね。" }
        ]
      },
      {
        id: "q4",
        title: "⑤ 本当はどうしたい？",
        options: [
          { value: "yasumitai", label: "休みたい", message: "本当は少し立ち止まって、安心を取り戻したい気持ちがあるのかも🍀\n休むことは後退じゃなくて、整い直すための大切な時間だよ。" },
          { value: "susumitai", label: "進みたい", message: "心の奥には『このままじゃ終わりたくない』という前向きな力がありそう🔥\nその思いを急がせすぎず、ひとつずつ形にしていこうね。" },
          { value: "anshin", label: "安心したい", message: "いちばん欲しいのは、答えよりも安心感なのかもしれないね🌿\nまずは『大丈夫』を感じられる場所や時間を増やしてみてね。" },
          { value: "kawaritai", label: "変わりたい", message: "今のままではなく、もっと自然な自分に近づきたい気持ちがあるみたい🦋\n変化は大きくなくていいよ。小さな選択から流れは変わっていくからね。" },
          { value: "wakaranai", label: "わからない", message: "まだ答えが見えないのは、心がだめなんじゃなくて、今は整理中なだけだよ☁️\nわからないままでも大丈夫。やさしく見守っていこうね。" }
        ]
      },
      {
        id: "q5",
        title: "⑥ 今の自分にかけるなら？",
        options: [
          { value: "daijobu", label: "大丈夫", message: "『大丈夫』という言葉を、自分自身にもっと向けてあげてもいい時みたい🌈\n安心は、外からもらうだけじゃなく、自分に贈ることもできるよ。" },
          { value: "sonomama", label: "そのままでいい", message: "今のあなたには、足すことよりも『もう十分』を受け取ることが必要なのかも🌸\nそのままのあなたにも、ちゃんと価値があるよ。" },
          { value: "yukkuri", label: "もう少しゆっくり", message: "急がなきゃと思うほど、心はゆっくりを求めていることもあるよ🌿\n少しペースを落とすだけでも、見える景色は変わってくるよ。" },
          { value: "dekiteru", label: "できてるよ", message: "気づいていないだけで、あなたはもう十分にやってきているみたい✨\n『まだまだ』より『ここまで来たね』を受け取ってみてね。" },
          { value: "shinjite", label: "信じていい", message: "今のあなたには、自分の感覚や歩みを信じることが必要なのかも💫\n答えは外だけじゃなく、ちゃんとあなたの中にもあるよ。" }
        ]
      }
    ];

    const typeData = [
      {
        name: "やさしさタイプ🌸",
        description: "人の気持ちに気づける、やわらかな感性を持っている人。\nやさしさを外に向けるのが得意だからこそ、自分にもそのやさしさを向けると整いやすいよ。"
      },
      {
        name: "行動タイプ🔥",
        description: "動くことで流れを作っていけるエネルギーを持っている人。\n進む力があるからこそ、がんばりすぎず軽やかさを忘れないことが鍵になりそう。"
      },
      {
        name: "バランスタイプ🌿",
        description: "全体を見ながら、ちょうどよいところを見つける力がある人。\n無理なく整えることが得意だから、自分のペースを大切にすると本来の力が出やすいよ。"
      },
      {
        name: "内観タイプ🌙",
        description: "静かに感じ取りながら、本質に気づく力を持っている人。\nすぐに答えを出さなくても大丈夫。落ち着いた時間の中で大切なものが見えてきそう。"
      },
      {
        name: "ひらめきタイプ✨",
        description: "ふとした感覚やインスピレーションを受け取りやすい人。\n思いつきを大切にすると、あなたらしい流れが自然と開いていきそうだよ。"
      }
    ];

    function showQuestionSection() {
      document.getElementById("coverSection").classList.add("hidden");
      document.getElementById("resultSection").classList.add("hidden");
      document.getElementById("questionSection").classList.remove("hidden");
      renderQuestions();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderQuestions() {
      const area = document.getElementById("questionsArea");
      area.innerHTML = "";

      questions.forEach((q) => {
        const block = document.createElement("div");
        block.className = "question-block";

        let optionsHtml = "";
        q.options.forEach((opt) => {
          optionsHtml += `
            <label class="option">
              <input type="radio" name="${q.id}" value="${opt.value}">
              ${opt.label}
            </label>
          `;
        });

        block.innerHTML = `
          <div class="question-title">${q.title}</div>
          <div class="option-list">${optionsHtml}</div>
        `;

        area.appendChild(block);
      });
    }

    function getTypeFromBirthday(birthdayValue) {
      const date = new Date(birthdayValue);
      const day = date.getDate();

      if (day >= 1 && day <= 6) return typeData[0];
      if (day >= 7 && day <= 12) return typeData[1];
      if (day >= 13 && day <= 18) return typeData[2];
      if (day >= 19 && day <= 24) return typeData[3];
      return typeData[4];
    }

    function getSelectedOption(question) {
      const checked = document.querySelector(`input[name="${question.id}"]:checked`);
      if (!checked) return null;
      return question.options.find(opt => opt.value === checked.value);
    }

    function buildSummary(selectedOptions, typeInfo) {
      const values = selectedOptions.map(opt => opt.value);

      if (values.includes("shindoi") || values.includes("tsukareteru") || values.includes("yasumitai")) {
        return "今のあなたは、がんばることよりも、まず安心と休息を受け取ることでやさしく整っていくタイミングかも🐾\n少し力を抜いて、自分をいたわるほうを選んでみてね。";
      }

      if (values.includes("moyamoya") || values.includes("mayotteru") || values.includes("wakaranai")) {
        return "今のあなたは、急いで答えを出すよりも、心の中をやさしく整理していくことで本来の流れに戻っていけそう🌿\n迷いもモヤモヤも、あなたがだめだからではなく、大切な途中なのかもしれないね。";
      }

      if (values.includes("susumitai") || values.includes("maemuki") || values.includes("genki")) {
        return "今のあなたは、前に進む力をちゃんと持っているみたい✨\nだからこそ焦らずに、自分に合うペースで進むことで、より軽やかな流れになっていきそうだよ。";
      }

      if (values.includes("anshin") || values.includes("daijobu") || values.includes("sonomama")) {
        return "今のあなたにいちばん必要なのは、答えよりも『大丈夫』と感じられる安心感なのかもしれないね🌸\n自分を責めるより、今ここでほっとできる感覚を大切にしてみてね。";
      }

      return "今のあなたは、無理に変えようとするよりも、自分の心の声をやさしく受け取ることで整っていくタイミングかも🌈\nそのままのあなたにも、ちゃんと意味があって、流れがあるよ。";
    }

    function showResult() {
      const birthday = document.getElementById("birthday").value;
      const errorBox = document.getElementById("errorMessage");

      errorBox.classList.add("hidden");
      errorBox.textContent = "";

      if (!birthday) {
        errorBox.textContent = "誕生日を入力してね🎂";
        errorBox.classList.remove("hidden");
        return;
      }

      const selectedOptions = [];

      for (const q of questions) {
        const selected = getSelectedOption(q);
        if (!selected) {
          errorBox.textContent = "すべての質問に答えてね🐾";
          errorBox.classList.remove("hidden");
          return;
        }
        selectedOptions.push(selected);
      }

      const typeInfo = getTypeFromBirthday(birthday);

      const typeHtml = `
        <h3>誕生日から見たあなたのタイプ</h3>
        <strong>${typeInfo.name}</strong><br>
        ${typeInfo.description.replace(/\n/g, "<br>")}
      `;

      const messages = selectedOptions.map(opt => opt.message).join("\n\n");
      const summary = buildSummary(selectedOptions, typeInfo);

      const resultText = `${messages}\n\n【まとめメッセージ】\n${summary}`;

      document.getElementById("typeBox").innerHTML = typeHtml;
      document.getElementById("resultBox").textContent = resultText;

      document.getElementById("questionSection").classList.add("hidden");
      document.getElementById("resultSection").classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function backToTop() {
      document.getElementById("birthday").value = "";

      questions.forEach((q) => {
        const checked = document.querySelector(`input[name="${q.id}"]:checked`);
        if (checked) checked.checked = false;
      });

      document.getElementById("resultSection").classList.add("hidden");
      document.getElementById("coverSection").classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  </script>
</body>
</html>
